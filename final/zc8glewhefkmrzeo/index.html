<script>
    const itmoves = new Audio("it_moves.mp3")
    itmoves.loop = true;

    var welcome = document.getElementById("welcome");
    var entry = document.getElementById("entry");
    var spaces = document.getElementsByClassName("inputSpace");
    var entryContent = document.getElementById("entryContent");
    var whole = document.getElementsByTagName("html")[0];

    var valueStr = "";
    var xuqowehrwiuehrfikub = "maybeourpathswillcrosswhenthisuniversefoldsinandmakesanothermaybeatthepointwhenallthatisandallthatseverbeencollapsesintoeverythingelseandisremadeourpathswillcrosshoweverbrieflyandourterminusbecomeajunctionitmaybealongshotiwilltakeitandhopeandtrustourpathswillcrossagain";

    for(var i=0; i<spaces.length; i++) {
        spaces[i].value = "";
    }
    
    setInterval(checkVals, 500);

    function startStage() {
        welcome.style.animation = "fade 1s linear 1";
        setTimeout(stageMid, 950);
    }
    function stageMid() {
        itmoves.play();
        welcome.style.display = "none";
        setTimeout(stageEnd, 1000);
    }
    function stageEnd() {
        entry.style.display = "block";
        entry.style.animation = "unfade 2s linear 1";
        console.info("Think back to the beginning of your journey.");
        console.info("What stayed with you always, but never found a use?")
    }
    function checkVals(test) {
        valueStr = "";
        for(var i=0; i<spaces.length; i++) {
            valueStr += spaces[i].value;
        }
        if(valueStr.toLowerCase() == xuqowehrwiuehrfikub || test == true) {
            whole.style.backgroundImage = "none";
            entry.style.display = "none";
            itmoves.pause();
            clearInterval(checkVals);
        }
    }
</script>
