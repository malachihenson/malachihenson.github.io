<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Access Only</title>
    <link rel="icon" type="image/x-icon" href="/img/favicon2.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Lacquer&display=swap');
        html {
            background-image: url("card.jpg");
        }
        body {
            font-family: "Lacquer", system-ui;
            text-align: center;
        }
        h1 {
            font-size: 60px;
        }
        h2 {
            font-size: 30px;
        }
        input {
            font-family: "Lacquer", system-ui;
            margin-top: 50px;
            width: 400px;
            height: 50px;
            font-size: 25px;
            text-align: center;
            border: 2px solid black;
            background: none;
        }
        input:focus {
            outline-style: solid;
        }
        a {
            float: left;
            color: black;
            font-size: 40px;
            margin-left: 50px;
        }
        button {
            background: none;
            font-family: "Lacquer", system-ui;
            font-size: 25px;
            padding: 5px 50px;
            border: 2px solid black;
        }
        button:active {
            border-width: 3px;
        }
        #help {
            margin-top: 400px;
        }
        #help p {
            opacity: 0;
            user-select: none;
            width: fit-content;
            margin: auto;
            font-size: 20px;
        }
        #help p:hover, #help p:active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <a href="../../index.html">Home</a><br>
    <h1>Access Restricted</h1>
    <h2>This page is password-protected. Be careful.</h2>
    <input type="password" id="pass" placeholder="password...">
    <br>
    <br>
    <button onclick="checkPass();">Submit</button>
    <br>
    <div id="help">
        <p>in a distant place of corrugation</p>
