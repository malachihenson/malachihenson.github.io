<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Links</title>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <style>
        @font-face {
            font-family: Melodica;
            src: url("/files/PixelPurl.ttf");
        }
        html {
            background-image: url("img/links/bg.png");
            background-repeat: repeat;
            background-position: center;
        }
        #wrapper {
            width: 60%;
            margin: auto;
        }
        body {
            font-family: Melodica, sans-serif;
            text-align: center;
        }
        h1 {
            font-size: 75px;
            font-weight: normal;
        }
        .linkBox img {
            width: 25%;
        }
        #linkGrid {
            display: grid;
            grid-template-columns: auto auto;
        }
        .linkText a {
            font-size: 30px;
            font-weight: normal;
        }
        h3 {
            font-weight: normal;
        }
        h2 {
            font-weight: normal;
            font-size: 25px;
        }
        @media screen and (max-width: 750px) {
            #linkGrid {
                grid-template-columns: auto;
            }
        }
        a {
            font-weight: normal;
            display: block;
            font-size: 40px;
        }
        img {
            width: 96px;
        }
        footer {
            font-size: 15px;
            margin-top: 50px;
        }
        footer p a {
            display: inline;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <header>
            <h1>Links</h1>
        </header>
        <br>
        <section id="linkGrid">
            <article class="linkBox">
                <img src="img/links/youtube.gif" alt="YouTube logo">
                <div class="linkText">
                    <a href="https://www.youtube.com/@DoubleSharpStudios">YouTube (nothing here currently)</a>
                    <h3>@doublesharpstudios</h3>
                </div>
            </article>
            <article class="linkBox">
                <img src="img/links/instagram.gif" alt="Instagram logo">
                <div class="linkText">
                    <a href="https://www.instagram.com/doublesharp.12/">Instagram</a>
                    <h3>@doublesharp.12<br>(chill people accepted on a case-by-case basis)</h3>
                </div>
            </article>
            <article class="linkBox">
                <img src="img/links/itch.gif" alt="Itch.io logo">
                <div class="linkText">
                    <a href="https://doublesharp.itch.io/">Itch (mostly dead)</a>
                    <h3>doublesharp</h3>
                </div>
            </article>
            <article class="linkBox">
                <img src="img/links/email.gif" alt="Email icon">
                <div class="linkText">
                    <a href="mailto:malachihenson12@gmail.com">Email</a>
                    <h3>malachihenson12@gmail.com</h3>
                </div>
            </article>
        </section>
        <img src="img/links/home.png" alt="Home icon">
        <a href="index.html">Home</a>
        <br>
    </div>
    <footer>
        <p>©2026 Malachi Henson | <a href="https://forms.gle/vXwXZQk5EJTK1fQd8">Report a Bug</a></p>
    </footer>
</body>
</html>
